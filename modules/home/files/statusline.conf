# Theme
set -g @catppuccin_flavor 'mocha'

# Status Line
set -g status 2
set -g status-format[1] " "

# Pane styling options
set -g @catppuccin_pane_status_enabled "yes" # set to "yes" to enable
set -g @catppuccin_pane_border_status "yes" # set to "yes" to enable
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_pane_left_separator ""
set -g @catppuccin_pane_middle_separator ""
set -g @catppuccin_pane_right_separator ""
set -g @catppuccin_pane_color "#{@thm_green}"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"
set -g @catppuccin_pane_default_text "##{b:pane_current_path}"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_number_position "left" # right, left

# Window styling options
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_text_color "#{@thm_mauve}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text " #[bg=#{@thm_mauve},fg=#{@thm_surface_0}]#W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_flags "none" # none, icon, or text

# Status line options
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no" # yes, no
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_module_bg_color "#{@thm_surface_0}"
set -g @catppuccin_date_time_text ' %d/%m %H:%M'

# Load theme
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

#Left Status
set -g status-left-length 100
set -g status-left " "

#Right
set -g status-right-length 100
set -gF status-right "#{E:@catppuccin_status_cpu}"
#set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#[bg=#{?client_prefix,#{E:@thm_lavender},#{@thm_green}},fg=#{@thm_bg}]#[reverse]#[noreverse]"
set -agF status-right "#[fg=#{?client_prefix, #{@thm_fg}, #{@thm_bg}},bg=#{?client_prefix,#{E:@thm_lavender},#{@thm_green}}]#(whoami)"
set -agF status-right "#[fg=#{@thm_bg},bg=#{?client_prefix,#{E:@thm_lavender},#{@thm_green}},reverse]#[none]"
set -agF status-right "#[bg=#{@thm_bg}] "
